<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽光発電パーツ搭載車両ビューア</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Meiryo', 'Yu Gothic', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

header { background: #1a1a2e; color: #fff; padding: 14px 28px; }
header h1 { font-size: 15px; font-weight: normal; letter-spacing: 0.06em; }

.main { max-width: 880px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 10px; }

.sel-bar {
  background: #fff; border-radius: 10px; border: 1px solid #ddd;
  padding: 13px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.sel-bar:hover { border-color: #999; }
.crumbs { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.crumb { font-size: 14px; font-weight: 500; color: #1a1a2e; }
.crumb-sep { color: #ccc; font-size: 15px; }
.change-btn {
  background: #1a1a2e; color: #fff; border: none;
  border-radius: 7px; padding: 7px 18px;
  font-size: 13px; cursor: pointer; white-space: nowrap;
}
.change-btn:hover { background: #2d2d52; }

.ladder {
  background: #fff; border-radius: 10px; border: 1px solid #ddd;
  overflow: hidden; display: none;
}
.ladder.open { display: block; }
.ladder-inner { padding: 22px 22px 18px; display: flex; flex-direction: column; }

.rung { display: flex; flex-direction: column; }
.rung-head {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; color: #888; letter-spacing: 0.08em; margin-bottom: 10px;
}
.rung-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: #1a1a2e; color: #fff;
  font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.rung-opts { display: flex; flex-wrap: wrap; gap: 6px; }
.rung-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 7px;
  border: 1px solid #ddd; background: #fafafa;
  font-size: 13px; cursor: pointer; color: #333;
  transition: all 0.1s;
}
.rung-btn:hover { background: #eef2ff; border-color: #99a; }
.rung-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.cdot {
  width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.12);
}
.rung-btn.active .cdot { border-color: rgba(255,255,255,0.3); }

.connector { height: 22px; display: flex; align-items: stretch; padding-left: 10px; }
.connector-line { width: 2px; background: #e4e4e4; }

.view-tabs {
  display: flex; background: #fff;
  border-radius: 10px; border: 1px solid #ddd;
  overflow: hidden; width: fit-content;
}
.view-tab {
  padding: 9px 30px; border: none; background: transparent;
  font-size: 13px; cursor: pointer; color: #666;
}
.view-tab:not(:last-child) { border-right: 1px solid #eee; }
.view-tab.active { background: #1a1a2e; color: #fff; }

.img-card { background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 16px; }

.view-panel { display: flex; flex-direction: column; gap: 10px; }
.view-panel.hidden { display: none; }

.img-slot {
  position: relative; background: #f8f8f8;
  border-radius: 8px; border: 1px solid #efefef;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.img-slot.lg { min-height: 320px; }
.img-slot.md { min-height: 230px; }
.img-slot img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
.slot-label {
  position: absolute; top: 10px; left: 10px;
  background: rgba(26,26,46,0.55); color: #fff;
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  pointer-events: none;
}
.no-img {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: #ccc; padding: 32px; font-size: 13px;
}
.no-img svg { opacity: 0.25; }

.meta { padding-top: 12px; display: flex; justify-content: space-between; align-items: center; }
.meta-label { font-size: 12px; color: #aaa; }
.badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; }
.badge-ok { background: #e6f4ea; color: #2d7a3a; }
.badge-ng { background: #fce8e6; color: #b31412; }

.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>太陽光発電パーツ搭載車両ビューア</h1>
</header>

<div class="main">

  <div class="sel-bar" onclick="toggleLadder()">
    <div class="crumbs">
      <span class="crumb" id="crumb-car">RAV4</span>
      <span class="crumb-sep">›</span>
      <span class="crumb" id="crumb-pos">ルーフのみ</span>
      <span class="crumb-sep">›</span>
      <span class="crumb" id="crumb-color">白</span>
    </div>
    <button class="change-btn" onclick="event.stopPropagation(); toggleLadder()">▼ 変更</button>
  </div>

  <div class="ladder" id="ladder">
    <div class="ladder-inner">

      <div class="rung">
        <div class="rung-head"><div class="rung-num">1</div>車種</div>
        <div class="rung-opts" id="opts-car">
          <button class="rung-btn active" onclick="pick('car','RAV4',this)">RAV4</button>
          <button class="rung-btn" onclick="pick('car','RX',this)">RX</button>
          <button class="rung-btn" onclick="pick('car','サクラ',this)">サクラ</button>
          <button class="rung-btn" onclick="pick('car','プリウス',this)">プリウス</button>
        </div>
      </div>

      <div class="connector"><div class="connector-line"></div></div>

      <div class="rung">
        <div class="rung-head"><div class="rung-num">2</div>太陽光パーツ設置位置</div>
        <div class="rung-opts" id="opts-pos">
          <button class="rung-btn active" onclick="pick('pos','ルーフのみ',this)">ルーフのみ</button>
          <button class="rung-btn" onclick="pick('pos','ルーフプラスボンネット',this)">ルーフ＋ボンネット</button>
          <button class="rung-btn" onclick="pick('pos','ルーフプラスリアガラス',this)">ルーフ＋リアガラス</button>
          <button class="rung-btn" onclick="pick('pos','ルーフボンネットリアガラス',this)">ルーフ＋ボンネット＋リアガラス</button>
        </div>
      </div>

      <div class="connector"><div class="connector-line"></div></div>

      <div class="rung">
        <div class="rung-head"><div class="rung-num">3</div>ボディカラー</div>
        <div class="rung-opts" id="opts-color">
          <button class="rung-btn active" onclick="pick('color','白',this)">
            <span class="cdot" style="background:#f0f0f0;"></span>白
          </button>
          <button class="rung-btn" onclick="pick('color','黒',this)">
            <span class="cdot" style="background:#222;"></span>黒
          </button>
          <button class="rung-btn" onclick="pick('color','メインカラー1',this)">
            <span class="cdot" id="dot-c1" style="background:#7a8c5e;"></span>
            <span id="lbl-c1">カラー1</span>
          </button>
          <button class="rung-btn" onclick="pick('color','メインカラー2',this)">
            <span class="cdot" id="dot-c2" style="background:#c0392b;"></span>
            <span id="lbl-c2">カラー2</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" onclick="setView(1,this)">View 1</button>
    <button class="view-tab" onclick="setView(2,this)">View 2</button>
  </div>

  <div class="img-card">

    <div class="view-panel" id="view1">
      <div class="img-slot lg">
        <span class="slot-label">斜め上</span>
        <img id="img-main" alt="" />
        <div class="no-img" id="no-main">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          画像は未準備です
        </div>
      </div>
      <div class="img-slot md">
        <span class="slot-label">リアガラス</span>
        <img id="img-rg" alt="" />
        <div class="no-img" id="no-rg">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          画像は未準備です
        </div>
      </div>
    </div>

    <div class="view-panel hidden" id="view2">
      <div class="img-slot md">
        <span class="slot-label">正面</span>
        <img id="img-front" alt="" />
        <div class="no-img" id="no-front">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          画像は未準備です
        </div>
      </div>
      <div class="img-slot md">
        <span class="slot-label">真後ろ</span>
        <img id="img-rear" alt="" />
        <div class="no-img" id="no-rear">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          画像は未準備です
        </div>
      </div>
    </div>

    <div class="meta">
      <span class="meta-label" id="meta-label"></span>
      <span class="badge" id="meta-badge"></span>
    </div>

  </div>

</div>

<script>
const state = { car: 'RAV4', pos: 'ルーフのみ', color: '白' };

const POS_LABELS = {
  'ルーフのみ':             'ルーフのみ',
  'ルーフプラスボンネット':  'ルーフ＋ボンネット',
  'ルーフプラスリアガラス':  'ルーフ＋リアガラス',
  'ルーフボンネットリアガラス': 'ルーフ＋ボンネット＋リアガラス',
};

const C = {
  RAV4:    { メインカラー1: { label: 'カラー1（アーバンカーキー）', dot: '#7a8c5e', sfx: '_アーバンカーキー' },
              メインカラー2: { label: 'カラー2（レッドマイカ）',    dot: '#c0392b', sfx: '_レッドマイカ' } },
  RX:      { メインカラー1: { label: 'カラー1（ソニックカッパー）',  dot: '#b87333', sfx: '_ソニックカッパー' },
              メインカラー2: { label: 'カラー2（ブルーマイカ）',    dot: '#2980b9', sfx: '_ブルーマイカ' } },
  サクラ:   { メインカラー1: { label: 'カラー1（ソルベブルー）',   dot: '#5b9bd5', sfx: '_ソルベブルー' },
              メインカラー2: { label: 'カラー2（スパークリングレッド）', dot: '#cc2200', sfx: '_スパークリングレッド' } },
  プリウス: { メインカラー1: { label: 'カラー1',                   dot: '#888',    sfx: '' },
              メインカラー2: { label: 'カラー2',                   dot: '#888',    sfx: '' } },
};

function mainPath() {
  const { car, pos, color } = state;
  const sfx = (color === 'メインカラー1' || color === 'メインカラー2') ? (C[car]?.[color]?.sfx || '') : '';
  return `${car}/${car}_${pos}_${color}${sfx}.png`;
}

function colorLabel() {
  const { car, color } = state;
  return (color === 'メインカラー1' || color === 'メインカラー2') ? (C[car]?.[color]?.label || color) : color;
}

let mainOk = false;
function load(imgId, noId, src) {
  const img = document.getElementById(imgId);
  const no  = document.getElementById(noId);
  img.style.display = 'none'; no.style.display = 'flex';
  img.onload  = () => { img.style.display = 'block'; no.style.display = 'none'; if (imgId === 'img-main') setBadge(true); };
  img.onerror = () => { img.style.display = 'none';  no.style.display = 'flex'; if (imgId === 'img-main') setBadge(false); };
  img.src = src;
}

function setBadge(ok) {
  const b = document.getElementById('meta-badge');
  b.textContent = ok ? '画像あり' : '未準備';
  b.className = 'badge ' + (ok ? 'badge-ok' : 'badge-ng');
}

function updateAll() {
  const { car, pos } = state;
  const cl = colorLabel();
  document.getElementById('crumb-car').textContent   = car;
  document.getElementById('crumb-pos').textContent   = POS_LABELS[pos] || pos;
  document.getElementById('crumb-color').textContent = cl;
  document.getElementById('meta-label').textContent  = `${car} ／ ${POS_LABELS[pos]} ／ ${cl}`;
  load('img-main',  'no-main',  mainPath());
  load('img-rg',    'no-rg',    `${car}リアガラス.png`);
  load('img-front', 'no-front', `${car}正面.png`);
  load('img-rear',  'no-rear',  `${car}真後ろ.png`);
}

function syncColorBtns() {
  const { car } = state;
  [['1','メインカラー1'],['2','メインカラー2']].forEach(([id, key]) => {
    document.getElementById(`dot-c${id}`).style.background = C[car]?.[key]?.dot || '#888';
    document.getElementById(`lbl-c${id}`).textContent      = C[car]?.[key]?.label || key;
  });
}

function toggleLadder() {
  document.getElementById('ladder').classList.toggle('open');
}

function pick(group, val, btn) {
  state[group] = val;
  const map = { car: 'opts-car', pos: 'opts-pos', color: 'opts-color' };
  document.querySelectorAll(`#${map[group]} .rung-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (group === 'car')   syncColorBtns();
  if (group === 'color') document.getElementById('ladder').classList.remove('open');
  updateAll();
}

function setView(n, btn) {
  document.getElementById('view1').classList.toggle('hidden', n !== 1);
  document.getElementById('view2').classList.toggle('hidden', n !== 2);
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

syncColorBtns();
updateAll();
</script>
</body>
</html>
