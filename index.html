<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobility viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Meiryo', 'Yu Gothic', sans-serif;
  background: #f0f2f5; color: #222;
  display: flex; flex-direction: column; height: 100vh;
}

header {
  background: #1a1a2e; color: #fff;
  padding: 10px 20px; flex-shrink: 0;
}
header h1 { font-size: 13px; font-weight: normal; letter-spacing: 0.06em; }

/* ── コントロールバー ── */
.ctrl-bar {
  background: #fff; border-bottom: 1px solid #ddd;
  padding: 10px 16px; flex-shrink: 0;
  display: flex; align-items: center; gap: 20px;
}
.divider { width: 1px; height: 28px; background: #e0e0e0; flex-shrink: 0; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11px; color: #888; white-space: nowrap; }

/* ビュータブ */
.view-tabs { display: flex; border: 1px solid #c0c0d0; border-radius: 7px; overflow: hidden; }
.view-tab {
  padding: 6px 18px; border: none; background: #fafafa;
  font-size: 13px; cursor: pointer; color: #555;
  border-right: 1px solid #ddd; font-weight: 500;
  transition: opacity 0.15s;
}
.view-tab:last-child { border-right: none; }
.view-tab:hover:not(:disabled) { background: #eef2ff; }
.view-tab.active { background: #1a1a2e; color: #fff; }
.view-tab:disabled { opacity: 0.35; cursor: not-allowed; }

/* パーツカラーモードボタン */
.parts-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 7px;
  border: 1.5px solid #3a9a4a; background: #fff;
  font-size: 13px; cursor: pointer; color: #3a9a4a; font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.parts-btn:hover { background: #f0faf0; }
.parts-btn.active { background: #3a9a4a; color: #fff; }
.pip { width: 9px; height: 9px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* 車種 */
.car-wrap { position: relative; }
.car-display { display: flex; align-items: center; gap: 8px; }
.car-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
.change-btn {
  background: #1a1a2e; color: #fff; border: none;
  border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
}
.change-btn:hover { background: #2d2d52; }
.car-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
  background: #fff; border: 1px solid #ddd; border-radius: 8px;
  padding: 8px; display: none; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); white-space: nowrap;
}
.car-dropdown.open { display: flex; }
.car-btn {
  padding: 7px 16px; border-radius: 6px; border: 1px solid #ddd;
  background: #fafafa; font-size: 13px; cursor: pointer; color: #333;
}
.car-btn:hover { background: #eef2ff; }
.car-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

/* セグメントボタン */
.seg { display: flex; border: 1px solid #ddd; border-radius: 7px; overflow: hidden; }
.seg-btn {
  padding: 6px 14px; border: none; background: #fafafa;
  font-size: 13px; cursor: pointer; color: #555;
  border-right: 1px solid #ddd; transition: opacity 0.15s;
}
.seg-btn:last-child { border-right: none; }
.seg-btn:hover:not(:disabled) { background: #eef2ff; }
.seg-btn.active { background: #1a1a2e; color: #fff; }
.seg-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* カラーボタン */
.color-btns { display: flex; gap: 5px; }
.color-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 7px; border: 1px solid #ddd;
  background: #fafafa; font-size: 13px; cursor: pointer; color: #333;
  transition: opacity 0.15s;
}
.color-btn:hover:not(:disabled) { background: #eef2ff; }
.color-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.color-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.cdot { width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.14); flex-shrink: 0; }
.color-btn.active .cdot { border-color: rgba(255,255,255,0.3); }

/* ── ビュー1 レイアウト（左：メイン ／ 右：ワイプ） ── */
#view1-area {
  flex: 1; min-height: 0;
  display: flex;
  gap: 12px;
  padding: 12px 16px;
}

/* メイン画像パネル（斜め上）：左側に広く */
#panel-main {
  flex: 1; min-width: 0; height: 100%;
  background: #fff; border-radius: 10px; border: 1px solid #ddd;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#panel-main.parts-mode { border-color: #3a9a4a; box-shadow: 0 0 0 1.5px #3a9a4a33; }

/* ワイプパネル（リアガラス）：右側に小さく */
#panel-rg {
  flex-shrink: 0;
  width: 28%;
  height: 52%;
  align-self: flex-start;
  background: #fff; border-radius: 8px;
  border: 2.5px solid #fff;
  box-shadow: 0 6px 24px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#panel-rg.parts-mode { border-color: #3a9a4a; box-shadow: 0 6px 24px rgba(58,154,74,0.25), 0 0 0 1px #3a9a4a55; }

/* ── ビュー2 レイアウト（2列グリッド） ── */
#view2-area {
  flex: 1; min-height: 0;
  padding: 12px 16px;
  gap: 12px;
}

.v2-panel {
  background: #fff; border-radius: 10px; border: 1px solid #ddd;
  display: flex; flex-direction: column; overflow: hidden; min-height: 0;
}
.panel-header {
  padding: 8px 14px; border-bottom: 1px solid #eee; flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-title { font-size: 11px; color: #888; }

/* 共通：画像スロット */
.img-slot {
  flex: 1; min-height: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 10px;
}
.img-slot img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
.no-img {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; color: #ccc; font-size: 12px;
}
.no-img svg { opacity: 0.25; }

/* ビュー2正面トグル */
.rg-toggle { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
.rg-btn {
  padding: 4px 11px; border: none; background: #fafafa;
  font-size: 12px; cursor: pointer; color: #555;
  border-right: 1px solid #ddd;
}
.rg-btn:last-child { border-right: none; }
.rg-btn:hover { background: #eef2ff; }
.rg-btn.active { background: #1a1a2e; color: #fff; }

/* バッジ */
.badge { font-size: 10px; padding: 2px 9px; border-radius: 20px; }
.badge-ok { background: #e6f4ea; color: #2d7a3a; }
.badge-ng { background: #fce8e6; color: #b31412; }
</style>
</head>
<body>

<header>
  <h1>mobility viewer</h1>
</header>

<div class="ctrl-bar">

  <!-- ビュー切替 -->
  <div class="ctrl-group">
    <span class="ctrl-label">ビュー</span>
    <div class="view-tabs">
      <button class="view-tab active" id="view1-tab" onclick="switchView(1,this)">ビュー1</button>
      <button class="view-tab" id="view2-tab" onclick="switchView(2,this)">ビュー2</button>
    </div>
  </div>

  <!-- パーツカラーモード（ビュー1専用） -->
  <div class="ctrl-group">
    <button class="parts-btn" id="parts-toggle" onclick="togglePartsColor()">
      <span class="pip"></span>パーツカラー
    </button>
  </div>

  <div class="divider"></div>

  <!-- 車種 -->
  <div class="ctrl-group">
    <span class="ctrl-label">車種</span>
    <div class="car-wrap" id="car-wrap">
      <div class="car-display">
        <span class="car-name" id="car-value">RAV4</span>
        <button class="change-btn" onclick="toggleCarDrop()">▼ 変更</button>
      </div>
      <div class="car-dropdown" id="car-dropdown">
        <button class="car-btn active" onclick="pickCar('RAV4',this)">RAV4</button>
        <button class="car-btn" onclick="pickCar('RX',this)">RX</button>
        <button class="car-btn" onclick="pickCar('サクラ',this)">サクラ</button>
        <button class="car-btn" onclick="pickCar('プリウス',this)">プリウス</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- パーツ設置位置（ビュー1のみ） -->
  <div class="ctrl-group" id="ctrl-pos">
    <span class="ctrl-label">パーツ設置位置</span>
    <div class="seg" id="opts-pos">
      <button class="seg-btn" onclick="pick('pos','パネルなし',this)">なし</button>
      <button class="seg-btn active" onclick="pick('pos','ルーフのみ',this)">ルーフ</button>
      <button class="seg-btn" onclick="pick('pos','ルーフプラスボンネット',this)">ルーフ＋ボンネット</button>
    </div>
  </div>
  <div class="divider" id="div-pos"></div>

  <!-- ボディカラー -->
  <div class="ctrl-group">
    <span class="ctrl-label">ボディカラー</span>
    <div class="color-btns" id="opts-color">
      <button class="color-btn active" onclick="pick('color','白',this)">
        <span class="cdot" style="background:#f0f0f0;"></span>白
      </button>
      <button class="color-btn" onclick="pick('color','黒',this)">
        <span class="cdot" style="background:#222;"></span>黒
      </button>
      <button class="color-btn" onclick="pick('color','メインカラー1',this)">
        <span class="cdot" id="dot-c1" style="background:#7a8c5e;"></span>カラー1
      </button>
      <button class="color-btn" onclick="pick('color','メインカラー2',this)">
        <span class="cdot" id="dot-c2" style="background:#c0392b;"></span>カラー2
      </button>
    </div>
  </div>

</div>

<!-- ビュー1：斜め上（メイン） ＋ リアガラス（ワイプ） -->
<div id="view1-area">

  <!-- メイン：斜め上 -->
  <div id="panel-main">
    <div class="img-slot">
      <img id="img-main" alt="" />
      <div class="no-img" id="no-main">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
        画像は未準備です
      </div>
    </div>
  </div>

  <!-- ワイプ：リアガラス -->
  <div id="panel-rg">
    <div class="img-slot">
      <img id="img-rg" alt="" />
      <div class="no-img" id="no-rg">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
        未準備
      </div>
    </div>
  </div>

</div>

<!-- ビュー2：正面 ＋ 真後ろ -->
<div id="view2-area" style="display:none;">

  <div class="v2-panel">
    <div class="panel-header">
      <span class="panel-title">正面</span>
      <div class="rg-toggle">
        <button class="rg-btn" onclick="pickShomen('パネルなし',this)">パネルなし</button>
        <button class="rg-btn active" onclick="pickShomen('ボンネット＋ルーフ',this)">ボンネット＋ルーフ</button>
      </div>
    </div>
    <div class="img-slot">
      <img id="img-shomen" alt="" />
      <div class="no-img" id="no-shomen">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
        画像は未準備です
      </div>
    </div>
  </div>

  <div class="v2-panel">
    <div class="panel-header">
      <span class="panel-title">真後ろ</span>
      <span class="badge" id="badge-maushiro"></span>
    </div>
    <div class="img-slot">
      <img id="img-maushiro" alt="" />
      <div class="no-img" id="no-maushiro">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
        画像は未準備です
      </div>
    </div>
  </div>

</div>

<script>
const state = {
  car: 'RAV4', pos: 'ルーフのみ', color: '白',
  view: 1, shomen: 'ボンネット＋ルーフ',
  partsColor: false
};

const C = {
  RAV4:    { メインカラー1: { dot: '#7a8c5e', sfx: '_アーバンカーキー', sfxSub: '_カーキー' },
              メインカラー2: { dot: '#c0392b', sfx: '_レッドマイカ' } },
  RX:      { メインカラー1: { dot: '#b87333', sfx: '_ソニックカッパー' },
              メインカラー2: { dot: '#2980b9', sfx: '_ブルーマイカ' } },
  サクラ:   { メインカラー1: { dot: '#5b9bd5', sfx: '_ソルベブルー' },
              メインカラー2: { dot: '#cc2200', sfx: '_スパークリングレッド' } },
  プリウス: { メインカラー1: { dot: '#888', sfx: '' },
              メインカラー2: { dot: '#888', sfx: '' } },
};

function getSfx(car, color, isMain) {
  if (color !== 'メインカラー1' && color !== 'メインカラー2') return '';
  const info = C[car]?.[color];
  if (!info) return '';
  return (!isMain && info.sfxSub) ? info.sfxSub : (info.sfx || '');
}

const POS_FILE   = { 'パネルなし': 'なし', 'ルーフのみ': 'ルーフ', 'ルーフプラスボンネット': 'ルーフ＋ボンネット' };
const COLOR_FILE = { '白': '白', '黒': '黒', 'メインカラー1': 'カラー1', 'メインカラー2': 'カラー2' };

/* ── パス生成 ── */
function mainPath() {
  const { car, pos, color } = state;
  if (state.partsColor)
    return `${car}/${car}_斜め上_ルーフ＋ボンネット_${COLOR_FILE[color]}_パーツカラー.png`;
  return `${car}/${car}_斜め上_${POS_FILE[pos]}_${COLOR_FILE[color]}${getSfx(car, color, true)}.png`;
}

function rgPath() {
  const { car, pos, color } = state;
  if (state.partsColor)
    return `${car}/${car}_リアガラス_パーツカラー_${COLOR_FILE[color]}.png`;
  /* パーツ設置位置に連動して自動切替 */
  if (pos === 'パネルなし')
    return `${car}/${car}_リアガラス_パネルなし_白.png`;
  return `${car}/${car}_リアガラス_パネルあり_${COLOR_FILE[color]}${getSfx(car, color, false)}.png`;
}

function shomenPath() {
  const { car, color, shomen } = state;
  return `${car}/${car}_正面_${shomen}_${COLOR_FILE[color]}${getSfx(car, color, false)}.png`;
}

function maushiroPath() {
  const { car, color } = state;
  return `${car}/${car}_真後ろ_パネル有りなし併用_${COLOR_FILE[color]}${getSfx(car, color, false)}.png`;
}

/* ── 画像ロード ── */
function load(imgId, noId, src) {
  const img = document.getElementById(imgId);
  const no  = document.getElementById(noId);
  img.onload = img.onerror = null;
  img.style.display = 'none'; no.style.display = 'flex';
  img.onload  = () => { img.style.display = 'block'; no.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none';  no.style.display = 'flex'; };
  img.src = src;
}

function setBadge(id, ok) {
  const b = document.getElementById(id);
  if (!b) return;
  b.textContent = ok ? '画像あり' : '未準備';
  b.className = 'badge ' + (ok ? 'badge-ok' : 'badge-ng');
}

function updateAll() {
  document.getElementById('car-value').textContent = state.car;
  if (state.view === 1) {
    load('img-main', 'no-main', mainPath());
    load('img-rg',   'no-rg',   rgPath());
  } else {
    load('img-shomen', 'no-shomen', shomenPath());
    const img = document.getElementById('img-maushiro');
    const no  = document.getElementById('no-maushiro');
    img.onload = img.onerror = null;
    img.style.display = 'none'; no.style.display = 'flex';
    img.onload  = () => { img.style.display = 'block'; no.style.display = 'none'; setBadge('badge-maushiro', true); };
    img.onerror = () => { img.style.display = 'none';  no.style.display = 'flex'; setBadge('badge-maushiro', false); };
    img.src = maushiroPath();
  }
}

/* ── パーツカラーモード ── */
function togglePartsColor() {
  state.partsColor = !state.partsColor;
  applyPartsColorMode();
  updateAll();
}

function applyPartsColorMode() {
  const on = state.partsColor;

  document.getElementById('parts-toggle').classList.toggle('active', on);

  /* ビュー2無効 */
  const v2tab = document.getElementById('view2-tab');
  v2tab.disabled = on;
  if (on && state.view === 2) {
    state.view = 1;
    document.getElementById('view2-area').style.display = 'none';
    document.getElementById('view1-area').style.display = 'block';
    document.getElementById('view1-tab').classList.add('active');
    v2tab.classList.remove('active');
    document.getElementById('ctrl-pos').style.display = 'flex';
    document.getElementById('div-pos').style.display = '';
  }

  /* パーツ設置位置：ルーフ＋ボンネット固定 */
  document.querySelectorAll('#opts-pos .seg-btn').forEach((b, i) => {
    b.disabled = on && i !== 2;
    if (on) b.classList.toggle('active', i === 2);
  });
  if (on) state.pos = 'ルーフプラスボンネット';

  /* カラー：白/黒のみ */
  if (on && state.color !== '白' && state.color !== '黒') {
    state.color = '白';
    document.querySelectorAll('#opts-color .color-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  }
  document.querySelectorAll('#opts-color .color-btn').forEach((b, i) => {
    b.disabled = on && i >= 2;
  });

  /* パネル枠色 */
  document.getElementById('panel-main').classList.toggle('parts-mode', on);
  document.getElementById('panel-rg').classList.toggle('parts-mode', on);
}

/* ── ビュー切替 ── */
function switchView(v, btn) {
  if (v === 2 && state.partsColor) return;
  state.view = v;
  document.getElementById('view1-area').style.display = v === 1 ? 'block' : 'none';
  document.getElementById('view2-area').style.display = v === 2 ? 'grid'  : 'none';
  document.getElementById('ctrl-pos').style.display   = v === 1 ? 'flex'  : 'none';
  document.getElementById('div-pos').style.display    = v === 1 ? ''      : 'none';
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateAll();
}

/* ── 車種 ── */
function syncColorDots() {
  ['メインカラー1','メインカラー2'].forEach((key, i) => {
    document.getElementById(`dot-c${i+1}`).style.background = C[state.car]?.[key]?.dot || '#888';
  });
}

function toggleCarDrop() {
  document.getElementById('car-dropdown').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!document.getElementById('car-wrap').contains(e.target))
    document.getElementById('car-dropdown').classList.remove('open');
});

function pickCar(val, btn) {
  state.car = val;
  document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('car-dropdown').classList.remove('open');
  syncColorDots();
  updateAll();
}

/* ── 設置位置 / カラー ── */
function pick(group, val, btn) {
  if (btn.disabled) return;
  state[group] = val;
  document.querySelectorAll(`#opts-${group} button`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateAll();
}

/* ── 正面ポジション（ビュー2） ── */
function pickShomen(val, btn) {
  state.shomen = val;
  btn.closest('.rg-toggle').querySelectorAll('.rg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  load('img-shomen', 'no-shomen', shomenPath());
}

/* ── ビュー2グリッドをCSS側で設定 ── */
document.getElementById('view2-area').style.display = 'none';
document.getElementById('view2-area').style.gridTemplateColumns = '1fr 1fr';

syncColorDots();
updateAll();
</script>
</body>
</html>
